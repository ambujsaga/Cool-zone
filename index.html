<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saga Cool Zone - Kill The Boredom</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1e1e30;
            --accent-color: #ff3366;
            --accent-glow: rgba(255, 51, 102, 0.4);
            --text-color: #ffffff;
            --text-secondary: #a0a0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff3366, #ff9933);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .main-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-area {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .punchline {
            color: #00ffcc;
            font-style: italic;
            margin-top: 10px;
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #ff3366, #ff5e3a);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            background-color: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .bg-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,51,102,0.05) 0%, transparent 60%);
            z-index: -1;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>Cool Zone</h1>
        <p class="subtitle">Boring day? Let's fix that instantly.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dare', event)">🔥 Do This</button>
            <button class="tab-btn" onclick="switchTab('riddle', event)">🧠 Brain Gym</button>
            <button class="tab-btn" onclick="switchTab('fact', event)">💡 Weird Fact</button>
        </div>

        <div class="main-card">
            <div class="content-area" id="content-display">
                Loading magic...
            </div>
            <div class="punchline" id="punchline-display"></div>
        </div>

        <button class="btn" id="action-btn" onclick="generateContent()">Next Magic</button>
    </div>

    <script>
        let currentTab = 'dare';
        let currentRiddleAnswer = '';

        // Dynamic content generators for unlimited unique combinations
        const subjects = ["Apne phone", "Apne kisi dost", "Ghar ke sabse bade member", "Agli cheez jo aap dekh rahe ho", "Apne crush", "Apne sabse purane group chat"];
        const actions = ["ko 10 seconds tak bina ruke ghooro", "ko ek ajeeb sa emoji text karo bina context ke", "ke baare me ek fake afwah socho", "ko left hand se touch karo", "ke liye ek cinematic reel mind me design karo"];
        const places = ["kitchen me jaakar", "apni chair par baithe-baithe", "aankhein band karke", "slow motion me"];

        const factsPrefix = ["Kya aapko pata hai? ", "Yeh ekdum sach hai: ", "Dimaag hila dene wala fact: ", "Scientists bhi hairan hain ki "];
        const factsBody = [
            "Wombats ka poop ekdum cube shape ka hota hai.",
            "Bananas thode se radioactive hote hain kyunki unme potassium hota hai.",
            "Insani dimaag utni electricity bana sakta hai jisse ek low-watt LED bulb jal jaye.",
            "Instagram par sabse zyada liked photo ek simple Ande (Egg) ki hai.",
            "Vatican City duniya ka sabse chota desh hai, sirf 0.49 sq km.",
            "Honey (Shahad) kabhi kharab nahi hota, chahe 3000 saal beet jayein.",
            "Ek octopus ke paas total 3 dimaag aur 9 dils hote hain.",
            "Siri ya Google Assistant ki aawaz ke piche real insani voice actors hote hain."
        ];

        const riddlesList = [
            {q: "Aisi kaun si jagah hai jahan agar 100 log jaate hain to 101 log vapis aate hain?", a: "Shadi ya Baarat! 😂"},
            {q: "Ek laathi ki suno kahani, jisme bhara hai meetha paani. Kya hai woh?", a: "Ganna (Sugarcane)! 🌾"},
            {q: "Kone mein rehti hai par poori duniya ghum leti hai. Kaun hai?", a: "Postage Stamp (Ticket)!"},
            {q: "Woh kya hai jo upar bhi jata hai, neeche bhi aata hai par apni jagah se hilta nahi?", a: "Seedi (Stairs)!"},
            {q: "Aisa kaun sa fal hai jise hum khareed nahi sakte?", a: "Mehnat ka fal!"},
            {q: "Kaan hain par sun nahi sakti, aankhein hain par dekh nahi sakti. Batao kaun?", a: "Gudiya (Doll)!"}
        ];

        function switchTab(tabName, event) {
            currentTab = tabName;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(event && event.target) {
                event.target.classList.add('active');
            }
            
            document.getElementById('punchline-display').style.display = 'none';
            
            const btn = document.getElementById('action-btn');
            if(tabName === 'riddle') btn.innerText = "Answer / Next";
            else btn.innerText = "Next Magic";

            generateContent();
        }

        function generateContent() {
            const display = document.getElementById('content-display');
            const punchline = document.getElementById('punchline-display');
            const actionBtn = document.getElementById('action-btn');
            
            // Riddle logic
            if(currentTab === 'riddle' && punchline.style.display === 'none' && currentRiddleAnswer !== '') {
                punchline.style.display = 'block';
                actionBtn.innerText = "Next Riddle";
                return;
            }

            punchline.style.display = 'none';

            if (currentTab === 'dare') {
                // Generates mixed random tasks on the fly
                let sub = subjects[Math.floor(Math.random() * subjects.length)];
                let act = actions[Math.floor(Math.random() * actions.length)];
                let plc = places[Math.floor(Math.random() * places.length)];
                
                display.innerText = `🎯 Task: ${plc} ${sub} ${act}.`;
                actionBtn.innerText = "Next Magic";
            } 
            else if (currentTab === 'fact') {
                let pre = factsPrefix[Math.floor(Math.random() * factsPrefix.length)];
                let body = factsBody[Math.floor(Math.random() * factsBody.length)];
                
                display.innerText = `💡 ${pre}\n\n"${body}"`;
                actionBtn.innerText = "Next Magic";
            } 
            else if (currentTab === 'riddle') {
                let item = riddlesList[Math.floor(Math.random() * riddlesList.length)];
                
                display.innerText = `🤔 Paheli:\n\n"${item.q}"`;
                currentRiddleAnswer = item.a;
                punchline.innerText = `💡 Jawab: ${currentRiddleAnswer}`;
                actionBtn.innerText = "Show Answer";
            }
        }

        window.onload = function() {
            generateContent();
        };
    </script>
</body>
</html>
